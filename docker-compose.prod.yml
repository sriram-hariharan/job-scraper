services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-job_scraper_ops}
      POSTGRES_USER: ${POSTGRES_USER:-job_scraper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-job_scraper} -d $${POSTGRES_DB:-job_scraper_ops}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-job_scraper}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-job_scraper_ops}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data

volumes:
  postgres_data:
